<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrokVid - Invidious Lite</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; }
    input { width: 100%; padding: 15px; font-size: 18px; border: none; border-radius: 8px; margin-bottom: 20px; }
    button { padding: 10px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }
    .search-btn { background: #ff0000; color: white; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .video-card { background: #1f1f1f; border-radius: 10px; overflow: hidden; }
    .video-card img { width: 100%; height: auto; }
    iframe { width: 100%; height: 500px; border: none; }
    .controls { margin: 15px 0; }
    .loop-btn { background: #00ff00; color: black; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 GrokVid - YouTube Privacy Frontend</h1>
    <p>Lebih stabil + Loop Support • Cocok untuk PS Vita</p>

    <input type="text" id="search" placeholder="Cari video... (contoh: rick roll)" onkeypress="if(event.key === 'Enter') searchVideo()">
    <button class="search-btn" onclick="searchVideo()">🔎 Search</button>

    <div id="results" class="video-grid"></div>

    <div id="player" style="display:none; margin-top:30px;">
      <iframe id="videoFrame" allowfullscreen></iframe>
      <div class="controls">
        <button onclick="toggleLoop()" class="loop-btn" id="loopBtn">🔁 Loop: OFF</button>
        <button onclick="closePlayer()">❌ Tutup</button>
      </div>
    </div>
  </div>

  <script>
    const instances = [
      "https://inv.nadeko.net",
      "https://invidious.io",
      "https://yewtu.be",
      "https://piped.video",
      "https://vid.puffyan.us"
    ];

    let currentInstance = 0;
    let isLooping = false;

    async function searchVideo() {
      const query = document.getElementById('search').value;
      if (!query) return;

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = "<p>Sedang mencari...</p>";

      try {
        const res = await fetch(`https://inv.nadeko.net/api/v1/search?q=${encodeURIComponent(query)}`);
        const videos = await res.json();

        resultsDiv.innerHTML = '';
        videos.slice(0, 12).forEach(v => {
          const card = document.createElement('div');
          card.className = 'video-card';
          card.innerHTML = `
            <img src="${v.thumbnail}" alt="${v.title}">
            <h3>${v.title}</h3>
            <p>${v.author}</p>
            <button onclick="playVideo('${v.videoId}')">▶ Play</button>
          `;
          resultsDiv.appendChild(card);
        });
      } catch (e) {
        resultsDiv.innerHTML = "<p>Gagal. Coba lagi atau ganti instance.</p>";
      }
    }

    function playVideo(videoId) {
      const player = document.getElementById('player');
      const frame = document.getElementById('videoFrame');
      
      // Coba instance yang stabil
      frame.src = `${instances[currentInstance]}/embed/${videoId}?autoplay=1&loop=${isLooping ? 1 : 0}`;
      player.style.display = 'block';
    }

    function toggleLoop() {
      isLooping = !isLooping;
      document.getElementById('loopBtn').textContent = `🔁 Loop: ${isLooping ? 'ON' : 'OFF'}`;
      
      // Reload iframe dengan parameter loop
      const frame = document.getElementById('videoFrame');
      if (frame.src) {
        const currentSrc = frame.src.split('?')[0];
        frame.src = `${currentSrc}?autoplay=1&loop=${isLooping ? 1 : 0}&playlist=${frame.src.split('/embed/')[1].split('?')[0]}`;
      }
    }

    function closePlayer() {
      document.getElementById('player').style.display = 'none';
      document.getElementById('videoFrame').src = '';
    }

    // Auto fallback jika instance mati
    document.getElementById('videoFrame').onerror = () => {
      currentInstance = (currentInstance + 1) % instances.length;
      console.log("Ganti instance ke:", instances[currentInstance]);
    };
  </script>
</body>
</html>
